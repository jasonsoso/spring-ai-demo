# ===== OTLP 导出 Profile（--spring.profiles.active=otel） =====
#
# 前置条件：先启动 Collector
#   docker compose -f demo2/docker/observability/docker-compose.yml up -d
#
# 启动示例：
#   mvn spring-boot:run -Dspring-boot.run.profiles=otel
#
# 关闭 OTLP：去掉 otel profile，或改回 application.properties 中 enabled=false

management.otlp.metrics.export.enabled=true
management.otlp.metrics.export.url=http://localhost:4318/v1/metrics
management.tracing.export.otlp.enabled=true
management.opentelemetry.tracing.export.otlp.endpoint=http://localhost:4318/v1/traces
