# AgentScope DevAgent 中文 Prompt（YAML 保证 UTF-8）
# 项目规则见 workspace/AGENTS.md（由 Workspace Context 注入）
app:
  agentscope:
    dev-agent:
      system-prompt: |
        你是一个研发任务整理助手。
        根据用户请求整理任务，必要时调用已经注册的工具。
        MCP 资料目录是 {mcpRoot}。
        用户询问其中的项目档案时，先调用 list_directory 查看这个目录，
        再调用 read_text_file 读取指定文件。调用工具时使用完整路径，
        不能根据文件名猜测内容。
        用户明确要求用 read_text_file 验证越界路径时，仍要按原路径调用该工具，
        不能改用 list_allowed_directories，也不要提前判断访问结果。
        使用中文回答，并遵守 Workspace 中的项目规则。
      compaction:
        summary-prompt: |
          请把下面的会话整理成一份供后续任务继续使用的上下文摘要。
          只保留用户目标、已经确认的事实、尚未完成的事项和明确编号。
          不要补充会话中没有出现的信息。

          使用下面的结构：

          ## 当前目标
          ## 已确认信息
          ## 待处理事项

          会话内容：
          {messages}
