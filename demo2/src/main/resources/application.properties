spring.application.name=demo2
server.port=8081

# 全局启用虚拟线程（Tomcat 请求处理、@Async、TaskExecutor 等）
spring.threads.virtual.enabled=true

springdoc.api-docs.path=/v3/api-docs

# Scalar API 文档
scalar.enabled=true
scalar.path=/scalar
scalar.url=/v3/api-docs
scalar.pageTitle=Demo2 AI API

# DeepSeek 配置（聊天功能）
spring.ai.deepseek.base-url=https://api.deepseek.com
spring.ai.deepseek.api-key=${DEEPSEEK_API_KEY:}
spring.ai.deepseek.chat.model=deepseek-v4-pro

# 模型提供方选择（DeepSeek 聊天 + 智谱 Embedding via OpenAI 兼容 API）
spring.ai.model.chat=deepseek
spring.ai.model.embedding.text=openai

# 智谱 Embedding（Spring AI 2.0 通过 OpenAI 兼容接口，复用 ZHIPUAI_API_KEY）
spring.ai.openai.api-key=${ZHIPUAI_API_KEY:}
spring.ai.openai.base-url=https://open.bigmodel.cn/api/paas/v4
spring.ai.openai.embedding.model=embedding-2

# MySQL 持久化聊天记忆配置（与 demo 隔离，使用独立库 spring_ai_agent2）
spring.datasource.url=jdbc:mysql://127.0.0.1:3306/spring_ai_agent2?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=${DB_PASSWORD:123456}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000

# Spring AI JDBC ChatMemory Repository（MySQL 使用 mariadb 平台脚本）
spring.ai.chat.memory.repository.jdbc.platform=mariadb
spring.ai.chat.memory.repository.jdbc.initialize-schema=never

# Session API JDBC（表 AI_SESSION / AI_SESSION_EVENT，与 spring_ai_chat_memory 独立）
# 索引无 IF NOT EXISTS，表已存在后须 never；全新库首次可 temporarily 改为 always 执行一次
spring.ai.session.repository.jdbc.initialize-schema=never
spring.ai.session.repository.jdbc.platform=mysql

# 累计 15 个 Turn 后触发压缩
agent.session-memory.compaction.turn-threshold=15
# 压缩后 prompt 里大约保留 10 条事件
agent.session-memory.compaction.max-events-to-keep=10
# 摘要时与旧窗口重叠 2 条，减少边界信息丢失
agent.session-memory.compaction.overlap-size=2
# Session 使用 deepseek-chat：deepseek-v4-pro 多轮 ToolCall 需 reasoning_content 回放，与 Session 事件回放不兼容
agent.session-memory.chat.model=deepseek-chat

# AutoMemoryTools 长期记忆根目录（按 userId 分子目录）
agent.memories.dir=${user.home}/.agent/memories
# AutoMemory 使用 deepseek-chat：thinking 模型（如 deepseek-v4-pro）多轮 ToolCall 需 reasoning_content 回放，与 JDBC 会话记忆不兼容
agent.auto-memory.chat.model=deepseek-chat

# RAG 配置（基础版：内存向量检索）
rag.knowledge-file=outdoor-travel-safety-guide.txt
rag.top-k=2

# RAG 优化版配置（Milvus 向量数据库，与 demo 共用实例、独立 collection）
spring.ai.vectorstore.milvus.client.host=localhost
spring.ai.vectorstore.milvus.client.port=19530
spring.ai.vectorstore.milvus.client.username=root
spring.ai.vectorstore.milvus.client.password=milvus
spring.ai.vectorstore.milvus.database-name=default
spring.ai.vectorstore.milvus.collection-name=travel_safety_embedding2
spring.ai.vectorstore.milvus.initialize-schema=true
spring.ai.vectorstore.milvus.embedding-dimension=1024
spring.ai.vectorstore.milvus.index-type=IVF_FLAT
spring.ai.vectorstore.milvus.metric-type=COSINE

# 优化版 RAG 检索参数
rag.optimized.top-k=5
rag.optimized.similarity-threshold=0.05
# 首次启动 true 写入 Milvus；已有数据后可改为 false 避免重复入库
rag.optimized.reindex-on-startup=false

# 电商客服知识库配置（文章整合：QuestionAnswerAdvisor + RetrievalAugmentationAdvisor）
# 知识库文档路径（支持 txt/docx/pdf 等格式，由 TikaDocumentReader 解析）
ecommerce.knowledge-file=ecommerce-knowledge-base.txt
# 首次启动设为 true 写入 Milvus；已入库后改为 false 避免重复入库
ecommerce.reindex-on-startup=false


# ===== MCP Server 配置（文章：同一服务 MCP Server + MCP Client） =====
spring.ai.mcp.server.name=demo2-mcp-server
spring.ai.mcp.server.version=1.0.0
spring.ai.mcp.server.type=SYNC
# 同一 JVM 时禁用 tool-callback-converter，避免循环依赖问题
spring.ai.mcp.server.tool-callback-converter=false

# ===== MCP Client 配置 =====
spring.ai.mcp.client.enabled=true
spring.ai.mcp.client.name=demo2-mcp-client
spring.ai.mcp.client.version=1.0.0
spring.ai.mcp.client.type=SYNC
# 同一 JVM 时设置 false，通过 ApplicationReadyEvent 手动初始化（避免服务端尚未就绪时连接失败）
spring.ai.mcp.client.initialized=false
spring.ai.mcp.client.toolcallback.enabled=true
# SSE 连接指向本地 MCP Server（demo2 端口 8081）
spring.ai.mcp.client.sse.connections.local-server.url=http://localhost:8081

# 应用就绪后是否手动初始化 MCP Client（同 JVM 部署时建议开启）
app.mcp.client.init-on-startup=true




# ===== Micrometer + OpenTelemetry 可观测性 =====
# 本地 Actuator 查看指标（不依赖 OTLP Collector）
management.endpoints.web.exposure.include=health,metrics,prometheus
management.endpoint.metrics.enabled=true
management.endpoint.prometheus.enabled=true

# ----- OTLP 导出开关说明 -----
# 【如何关闭】（默认，日常开发推荐）
#   1. 保持下方 enabled=false
#   2. endpoint URL 保持注释状态
#   3. 重启应用即可；本地指标仍可通过 /actuator/metrics、/actuator/prometheus 查看
#
# 【如何开启】（需要 Grafana/Tempo 全链路可观测时）
#   1. 先启动 Collector：
#      docker compose -f demo2/docker/observability/docker-compose.yml up -d
#   2. 取消下方 endpoint URL 的注释
#   3. 将 enabled 改为 true
#   4. 重启应用；Grafana UI：http://localhost:3000（默认 admin/admin）
#
# 【备选开启方式】使用 otel profile（见 application-otel.properties）：
#   mvn spring-boot:run -Dspring-boot.run.profiles=otel
#   或在 IDE 启动配置中添加 VM 参数：-Dspring.profiles.active=otel
#
# 未启动 Collector 却开启导出时，会周期性报 ConnectException: localhost:4318
management.otlp.metrics.export.enabled=false
management.tracing.export.otlp.enabled=false

# OTLP Collector 地址（关闭导出时请保持注释；开启时取消注释并配合 enabled=true）
#management.otlp.metrics.export.url=http://localhost:4318/v1/metrics
#management.opentelemetry.tracing.export.otlp.endpoint=http://localhost:4318/v1/traces

# 开发 100% 采样；生产建议 0.1
management.tracing.sampling.probability=1.0

# 日志关联 traceId（便于与 Grafana Tempo 对照）
logging.pattern.level=%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]



# 是否在 HTTP 响应头返回 X-Trace-Id（生产环境可设为 false）
app.trace.response-header.enabled=true

# ===== Agent Skills 配置（Spring AI 2.0 系列教程 · Agent Skills） =====
# 扫描 Cursor 用户 skills 目录 + classpath 内置示例 skills（ai-tutor、pdf）
agent.skills.dirs=file:C:/Users/Jason/.cursor/skills,classpath:/.claude/skills

# ===== Subagent / A2A Demo（Spring AI 2.0 系列教程 第五、六篇） =====
agent.tasks.paths=classpath:/agents/architect.md,classpath:/agents/builder.md
spring.ai.a2a.server.enabled=true
agent.a2a.remote.url=http://localhost:${server.port:8081}




# LLM 请求响应日志配置（SimpleLoggerAdvisor 全局拦截）
# Spring AI 整体 INFO，避免内部日志噪音
logging.level.org.springframework.ai=INFO
# SkillsTool 调试日志
logging.level.org.springaicommunity.agent.tools.SkillsTool=DEBUG
# 单独开启 LLM 请求响应日志（须在父包 INFO 之后单独声明）
logging.level.org.springframework.ai.chat.client.advisor.SimpleLoggerAdvisor=DEBUG
# 业务代码 DEBUG
logging.level.com.jason.demo.demo2=DEBUG
# 降低 JDBC 和 MySQL 驱动噪音
logging.level.org.springframework.jdbc=DEBUG
logging.level.com.mysql.cj=DEBUG
